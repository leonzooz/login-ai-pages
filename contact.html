<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡我們 — LoginAi</title>
<meta name="description" content="聯絡 LoginAi — AI 推薦能見度服務。讓我們協助您的品牌在 AI 搜尋引擎中被看見、被推薦。">
<link rel="canonical" href="https://loginai.io/contact.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans TC','PingFang TC',sans-serif;background:#0B0C0F;color:#C7CDD6;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:640px;margin:0 auto;padding:60px 24px;flex:1}
.logo{text-align:center;margin-bottom:40px}
.logo a{color:#4DA6FF;text-decoration:none;font-size:1.1rem;font-weight:600;letter-spacing:-0.3px}
.logo span{color:#8B5CF6}
h1{text-align:center;font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-0.5px}
.sub{text-align:center;color:#7C8590;font-size:0.92rem;margin-bottom:40px}
.contact-card{background:#111318;border:1px solid rgba(199,205,214,0.1);border-radius:16px;padding:32px}
.contact-card h2{font-size:1rem;color:#fff;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(199,205,214,0.08)}
.contact-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(199,205,214,0.05)}
.contact-item:last-child{border-bottom:none}
.contact-item .icon{width:36px;height:36px;border-radius:50%;background:rgba(77,166,255,0.1);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.contact-item .info{flex:1}
.contact-item .label{font-size:0.78rem;color:#7C8590}
.contact-item .value{font-size:0.92rem;color:#C7CDD6;font-weight:500}
.contact-item .value a{color:#4DA6FF;text-decoration:none}
.contact-item .value a:hover{text-decoration:underline}
.btn-wrap{text-align:center;margin-top:28px}
.btn{display:inline-block;padding:12px 32px;border-radius:10px;background:linear-gradient(100deg,#4DA6FF,#8B5CF6);color:#fff;text-decoration:none;font-weight:600;font-size:0.92rem;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.note{text-align:center;color:#7C8590;font-size:0.82rem;margin-top:16px}
.footer{text-align:center;padding:24px;color:#555;font-size:0.78rem;border-top:1px solid rgba(199,205,214,0.06)}
.footer a{color:#555;text-decoration:none;margin:0 10px}
.footer a:hover{color:#888}
@media(max-width:480px){.container{padding:40px 16px}.contact-card{padding:20px}}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><a href="/">Login<span>Ai</span></a></div>
  <h1>聯絡我們</h1>
  <p class="sub">讓 AI 看到你，並且開口推薦你</p>
  <div class="contact-card">
    <h2>📬 聯絡方式</h2>
    <div class="contact-item">
      <div class="icon">📧</div>
      <div class="info">
        <div class="label">Email</div>
        <div class="value"><a href="mailto:hello@loginai.io">hello@loginai.io</a></div>
      </div>
    </div>
    <div class="contact-item">
      <div class="icon">💬</div>
      <div class="info">
        <div class="label">立即開始</div>
        <div class="value">貼上你的網址，免費看見 AI 怎麼看你</div>
      </div>
    </div>
    <div class="btn-wrap">
      <a href="/" class="btn">返回首頁 · 免費檢測</a>
    </div>
    <div class="note">我們會在 24 小時內回覆</div>
  </div>
</div>
<div class="footer">
  <a href="/">首頁</a> · <a href="/privacy-policy.html">隱私政策</a> · <a href="/terms-of-service.html">服務條款</a>
  <br>© 2026 LoginAi — Search is becoming the Answer.
</div>
</body>
</html>
